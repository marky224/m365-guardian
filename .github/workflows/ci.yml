name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so gitleaks scans all commits, not just the tip
      # Run the gitleaks binary directly (the gitleaks-action requires a license
      # key for organizations); pin the version to match the pre-commit hook.
      - name: Run gitleaks
        run: |
          VERSION=8.30.1
          curl -fsSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
          tar xzf gitleaks.tar.gz gitleaks
          ./gitleaks git . --config .gitleaks.toml --redact --verbose --no-banner

  static:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # Install the full runtime + dev deps so mypy type-checks against the REAL
      # SDK stubs (msgraph/azure), matching local. Without this, ignore_missing_imports
      # would mask type errors in CI that surface locally — a silent divergence.
      - run: pip install -e ".[dev]"
      - run: ruff check backend
      - run: ruff format --check backend
      - run: mypy backend

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # Installs the full dependency set, which also verifies the project
      # installs and imports cleanly on a fresh machine.
      - run: pip install -e ".[dev]"
      - run: pytest
