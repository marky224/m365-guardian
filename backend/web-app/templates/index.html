<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M365 Guardian</title>
    <style>
        :root {
            --bg-primary: #1a1d23;
            --bg-secondary: #22252d;
            --bg-chat: #2a2d35;
            --accent: #0078d4;
            --accent-hover: #106ebe;
            --text-primary: #e8eaed;
            --text-secondary: #9aa0a6;
            --border: #3c4043;
            --user-bubble: #0078d4;
            --bot-bubble: #2d3139;
            --critical: #d13438;
            --warning: #ffc83d;
            --success: #107c10;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo {
            width: 36px; height: 36px;
            background: var(--accent);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        header h1 { font-size: 18px; font-weight: 600; }
        header p { font-size: 12px; color: var(--text-secondary); }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--success); margin-left: auto;
        }
        #chat-container {
            flex: 1; overflow-y: auto; padding: 24px;
            display: flex; flex-direction: column; gap: 16px;
        }
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 14px;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .message.user {
            align-self: flex-end;
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
        }
        .message.bot {
            align-self: flex-start;
            background: var(--bot-bubble);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }
        .message.bot pre {
            background: #1e2127;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
            font-size: 13px;
            font-family: 'Cascadia Code', 'Fira Code', monospace;
        }
        .message.bot code {
            font-family: 'Cascadia Code', 'Fira Code', monospace;
            font-size: 13px;
        }
        .message.bot strong { color: #58a6ff; }
        .typing-indicator {
            display: flex; gap: 4px; padding: 12px 16px;
            align-self: flex-start;
        }
        .typing-indicator span {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--text-secondary);
            animation: typing 1.2s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
        #input-area {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 16px 24px;
            display: flex; gap: 12px;
        }
        #user-input {
            flex: 1;
            background: var(--bg-chat);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            min-height: 44px;
            max-height: 120px;
        }
        #user-input:focus { border-color: var(--accent); }
        #send-btn {
            background: var(--accent);
            border: none;
            border-radius: 8px;
            padding: 0 20px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.15s;
        }
        #send-btn:hover { background: var(--accent-hover); }
        #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .quick-actions {
            display: flex; gap: 8px; flex-wrap: wrap;
            padding: 8px 24px;
            background: var(--bg-secondary);
        }
        .quick-action {
            background: var(--bg-chat);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 14px;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .quick-action:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">🛡️</div>
        <div>
            <h1>M365 Guardian</h1>
            <p>Microsoft 365 User & Security Management</p>
        </div>
        <div class="status-dot" title="Connected"></div>
    </header>

    <div id="chat-container">
        <div class="message bot">
            👋 <strong>Welcome to M365 Guardian!</strong><br><br>
            I can manage users, mailboxes, and security for your Microsoft 365 tenant.
            All actions require your explicit approval and are fully logged.<br><br>
            How can I help you today?
        </div>
    </div>

    <div class="quick-actions">
        <button class="quick-action" onclick="sendQuick('Create a new user')">➕ New User</button>
        <button class="quick-action" onclick="sendQuick('Reset a password')">🔑 Reset Password</button>
        <button class="quick-action" onclick="sendQuick('Enforce MFA for a user')">🔒 Enforce MFA</button>
        <button class="quick-action" onclick="sendQuick('Generate weekly security report')">📊 Security Report</button>
        <button class="quick-action" onclick="sendQuick('Show audit log')">📋 Audit Log</button>
    </div>

    <div id="input-area">
        <textarea id="user-input" placeholder="Type a command or question..." rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
        <button id="send-btn" onclick="send()">Send</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        let sessionId = crypto.randomUUID();
        let history = [];

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            if (role === 'bot') {
                // Basic markdown-like rendering
                div.innerHTML = text
                    .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\n/g, '<br>');
            } else {
                div.textContent = text;
            }
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'typing-indicator';
            div.id = 'typing';
            div.innerHTML = '<span></span><span></span><span></span>';
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function hideTyping() {
            const el = document.getElementById('typing');
            if (el) el.remove();
        }

        async function send() {
            const text = userInput.value.trim();
            if (!text) return;

            userInput.value = '';
            addMessage(text, 'user');
            sendBtn.disabled = true;
            showTyping();

            try {
                const resp = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text,
                        session_id: sessionId,
                        history: history,
                        user_name: 'Web User',
                    }),
                });

                const data = await resp.json();
                hideTyping();

                if (data.error) {
                    addMessage(`⚠️ Error: ${data.error}`, 'bot');
                } else {
                    addMessage(data.response, 'bot');
                    history = data.history || [];
                }
            } catch (err) {
                hideTyping();
                addMessage(`⚠️ Connection error: ${err.message}`, 'bot');
            }

            sendBtn.disabled = false;
            userInput.focus();
        }

        function sendQuick(text) {
            userInput.value = text;
            send();
        }

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
    </script>
</body>
</html>
